<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Entre em Contato</h1>
    <form action="">
        <p>

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required placeholder="Digitar seu nome"/>
        </p>
        <p>
        <label for="telefone">Telefone</label>
        <input type="number" id="telefone" name="telefone" required placeholder="Insira seu numero de telefone"> 
        </p>
        <p>
            <label for="msg"></label>
            <textarea name="msg" id="msg" cols="50" rows="4" placeholder="Deixe seu comentário"></textarea>
        </p>
        <button>Enviar</button>
    </form>
    
</body>
</html>
